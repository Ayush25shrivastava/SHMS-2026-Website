<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Static map placeholder for MNNIT Allahabad, Prayagraj">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Decorative roads -->
  <g fill="none" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" stroke-opacity="0.55">
    <path d="M120 640 C 420 520, 560 520, 860 640 S 1300 780, 1500 660"/>
    <path d="M180 250 C 420 340, 660 320, 880 220 S 1240 120, 1460 220"/>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-opacity="0.35">
    <path d="M260 520 C 520 420, 760 420, 1040 520 S 1360 660, 1460 600"/>
    <path d="M260 330 C 520 260, 760 260, 1040 330 S 1360 430, 1460 360"/>
  </g>

  <!-- River -->
  <path d="M-40 720 C 220 600, 520 660, 760 760 S 1200 980, 1680 780"
        fill="none" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round"/>

  <!-- Pin marker -->
  <g transform="translate(800 430)" filter="url(#shadow)">
    <path d="M0,-140 C-58,-140 -104,-94 -104,-36 C-104,24 -54,78 0,152 C54,78 104,24 104,-36 C104,-94 58,-140 0,-140Z"
          fill="#ef4444"/>
    <circle cx="0" cy="-44" r="40" fill="#ffffff"/>
    <circle cx="0" cy="-44" r="22" fill="#0f172a" fill-opacity="0.85"/>
  </g>

  <!-- Label card -->
  <g transform="translate(1040 560)" filter="url(#shadow)">
    <rect x="0" y="0" width="470" height="150" rx="16" fill="url(#card)"/>
    <text x="26" y="58" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="30" fill="#ffffff" font-weight="700">
      MNNIT Allahabad
    </text>
    <text x="26" y="98" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" fill="#e2e8f0">
      Prayagraj, Uttar Pradesh (static map)
    </text>
    <text x="26" y="128" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#cbd5e1">
      Use the Open in Google Maps link for live directions
    </text>
  </g>
</svg>
